<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}习惯追踪{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/dashboard" class="nav-logo">🎯 习惯追踪</a>
            {% if user %}
            <div class="nav-menu">
                <a href="/dashboard" class="nav-link">首页</a>
                <a href="/calendar" class="nav-link">日历打卡</a>
                <span class="nav-user">{{ user.username }}</span>
                <a href="/logout" class="nav-link logout">退出</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% if access_token %}
    <script>
        localStorage.setItem('habit_token', '{{ access_token }}');
    </script>
    {% endif %}
    {% block scripts %}{% endblock %}
</body>
</html>
